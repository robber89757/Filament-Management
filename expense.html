    <script>
        (function() {
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                document.write('<style id="sidebar-init-style">body { visibility: hidden; }</style>');
                document.addEventListener('DOMContentLoaded', function() {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarItems = document.querySelectorAll('.sidebar-item span');
                    const siteTitle = document.getElementById('siteTitle');
                    const sidebarToggle = document.getElementById('sidebarToggle');
                    
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    sidebarItems.forEach(item => item.classList.add('hidden'));
                    if (siteTitle) siteTitle.classList.add('hidden');
                    const icon = sidebarToggle.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-angle-left');
                        icon.classList.add('fa-angle-right');
                    }
                    
                    document.getElementById('sidebar-init-style').remove();
                    document.body.style.visibility = 'visible';
                });
            }
        })();

    <script>
        const API_BASE_URL = '/api';
        let expenses = [];
        let suppliers = [];
        let currentPage = 1;
        const pageSize = 10;
        let expenseTypes = [];
        let expenseChannels = [];
        
        let dbExpenseTypeColors = {};

        async function loadExpenseSettings() {
            try {
                const response = await fetch(`${API_BASE_URL}/expense-settings`);
                const data = await response.json();
                if (data.success) {
                    expenseTypes = data.data.expenseTypes;
                    expenseChannels = data.data.expenseChannels;
                    if (data.data.expenseTypeColors !== undefined) {
                        dbExpenseTypeColors = data.data.expenseTypeColors;
                    }
                    renderExpenseTypesSettings();
                    renderExpenseChannelsSettings();
                    updateExpenseTypeSelect();
                    updateChannelSelect();
                    updateExpenseTypeColorSelect();
                }
            } catch (error) {
                console.error('加载费用设置失败:', error);
            }
        }

        function updateExpenseTypeColorSelect() {
            const select = document.getElementById('expenseTypeColorSelect');
            if (!select) return;
            select.innerHTML = '<option value="">选择费用类型</option>' +
                expenseTypes.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
        }

        function renderExpenseTypesSettings() {
            const container = document.getElementById('expenseTypesList');
            container.innerHTML = expenseTypes.map((type, index) => {
                const color = dbExpenseTypeColors[type.id] || '#3b82f6';
                return `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm text-white" style="background-color: ${color}">
                    ${type.label}
                    <button onclick="removeExpenseType(${index})" class="hover:opacity-70">
                        <i class="fa fa-times"></i>
                    </button>
                </span>`;
            }).join('');
        }
        
        window.removeExpenseType = function(index) {
            expenseTypes.splice(index, 1);
            saveExpenseSettings();
            renderExpenseTypesSettings();
            updateExpenseTypeSelect();
        };
        
        function renderExpenseChannelsSettings() {
            const container = document.getElementById('expenseChannelsList');
            container.innerHTML = expenseChannels.map((channel, index) => `
                <span class="inline-flex items-center gap-1 px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm">
                    ${channel.label}
                    <button onclick="removeExpenseChannel(${index})" class="hover:text-red-500">
                        <i class="fa fa-times"></i>
                    </button>
                </span>
            `).join('');
        }
        
        window.removeExpenseChannel = function(index) {
            expenseChannels.splice(index, 1);
            saveExpenseSettings();
            renderExpenseChannelsSettings();
            updateChannelSelect();
        };
        
        async function saveExpenseSettings() {
            try {
                const response = await fetch(`${API_BASE_URL}/expense-settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ expenseTypes, expenseChannels })
                });
                const data = await response.json();
                if (!data.success) {
                    console.error('保存费用设置失败');
                }
            } catch (error) {
                console.error('保存费用设置失败:', error);
            }
        }
        
        function updateExpenseTypeSelect() {
            const select = document.getElementById('expenseTypeSelect');
            if (select) {
                select.innerHTML = expenseTypes.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
            }
        }
        
        function updateChannelSelect() {
            const select = document.getElementById('channelSelect');
            if (select) {
                select.innerHTML = '<option value="">无</option>' + 
                    expenseChannels.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
            }
        }
        
        async function loadSuppliers() {
            try {
                const response = await fetch(`${API_BASE_URL}/suppliers`);
                const data = await response.json();
                if (data.success) {
                    suppliers = data.data;
                }
            } catch (error) {
                console.error('加载供应商失败:', error);
            }
        }
        
        async function loadExpenses() {
            try {
                const response = await fetch(`${API_BASE_URL}/expense-records`);
                const data = await response.json();
                if (data.success) {
                    expenses = data.data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    updateStatistics();
                    renderExpenseTable();
                    renderTypeDistribution();
                    renderMonthlyChart();
                }
            } catch (error) {
                console.error('加载费用记录失败:', error);
            }
        }
        
        function getFilteredExpenses() {
            const range = document.getElementById('expenseRangeSelect').value;
            const now = new Date();
            if (range === 'month') {
                const currentMonth = now.toISOString().substring(0, 7);
                return expenses.filter(e => e.date.startsWith(currentMonth));
            } else if (range === 'quarter') {
                const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 2, 1);
                return expenses.filter(e => new Date(e.date) >= threeMonthsAgo);
            } else if (range === 'year') {
                const oneYearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
                return expenses.filter(e => new Date(e.date) >= oneYearAgo);
            }
            return expenses;
        }

        function updateStatistics() {
            const filtered = getFilteredExpenses();
            const total = filtered.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('totalExpense').textContent = `¥${total.toFixed(2)}`;

            const labelMap = { all: '总花费', month: '本月花费', quarter: '近三月花费', year: '近一年花费' };
            const range = document.getElementById('expenseRangeSelect').value;
            document.getElementById('expenseLabel').textContent = labelMap[range];
        }
        
        function renderTypeDistribution() {
            const defaultColorMap = {
                'filament': '#3b82f6',
                'equipment': '#22c55e',
                'electricity': '#eab308',
                'maintenance': '#a855f7',
                'other': '#6b7280'
            };
            
            const filtered = getFilteredExpenses();
            const typeTotals = {};
            filtered.forEach(e => {
                typeTotals[e.type] = (typeTotals[e.type] || 0) + e.amount;
            });
            
            const total = Object.values(typeTotals).reduce((sum, v) => sum + v, 0);
            const container = document.getElementById('typeDistribution');
            const pieChart = document.getElementById('typePieChart');
            const pieCenterText = document.getElementById('pieCenterText');

            if (total === 0) {
                pieChart.style.background = '#e5e7eb';
                pieCenterText.textContent = '暂无数据';
                container.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">暂无数据</div>';
                return;
            }

            const entries = Object.entries(typeTotals).sort((a, b) => b[1] - a[1]);
            let currentAngle = 0;
            const gradientParts = [];

            entries.forEach(([typeId, amount]) => {
                const percentage = amount / total * 100;
                const color = dbExpenseTypeColors[typeId] || defaultColorMap[typeId] || '#6b7280';
                gradientParts.push(`${color} ${currentAngle}% ${currentAngle + percentage}%`);
                currentAngle += percentage;
            });

            pieChart.style.background = `conic-gradient(${gradientParts.join(', ')})`;
            pieChart.style.borderRadius = '50%';
            pieCenterText.textContent = `¥${total.toFixed(0)}`;

            container.innerHTML = entries.map(([typeId, amount]) => {
                const typeInfo = expenseTypes.find(t => t.id === typeId) || { id: typeId, label: typeId };
                const color = dbExpenseTypeColors[typeId] || defaultColorMap[typeId] || '#6b7280';
                const percentage = (amount / total * 100).toFixed(1);
                return `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-2.5 h-2.5 rounded-full mr-2 flex-shrink-0" style="background: ${color}"></div>
                            <span class="text-sm text-gray-600">${typeInfo.label}</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-sm font-medium text-dark">¥${amount.toFixed(0)}</span>
                            <span class="text-xs text-gray-400 w-12 text-right">${percentage}%</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderMonthlyChart() {
            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            const years = [...new Set(expenses.map(e => new Date(e.date).getFullYear()))];
            if (years.length === 0) years.push(currentYear);
            years.sort((a, b) => b - a);
            
            yearSelect.innerHTML = years.map(y => 
                `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}年</option>`
            ).join('');
            
            const selectedYear = parseInt(yearSelect.value);
            const monthlyData = Array(12).fill(0);
            
            expenses.forEach(e => {
                const date = new Date(e.date);
                if (date.getFullYear() === selectedYear) {
                    monthlyData[date.getMonth()] += e.amount;
                }
            });
            
            const maxValue = Math.max(...monthlyData, 1);
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const chartHeight = 220;
            const barMaxHeight = chartHeight - 24;
            
            const container = document.getElementById('monthlyChart');
            container.innerHTML = `
                <div class="absolute bottom-6 left-0 right-0 flex items-end justify-around" style="height: ${barMaxHeight}px;">
                    ${monthlyData.map((value, index) => {
                        const barHeight = Math.max((value / maxValue) * barMaxHeight, 2);
                        return `
                            <div class="flex-1 flex flex-col items-center justify-end h-full px-1 relative group">
                                <div class="absolute bottom-full mb-2 px-2 py-1 bg-dark text-white text-xs rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10">${months[index]}: ¥${value.toFixed(2)}</div>
                                <div class="w-full bg-primary rounded-t cursor-pointer hover:opacity-80 transition-opacity" style="height: ${barHeight}px;"></div>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="absolute bottom-0 left-0 right-0 flex justify-around" style="height: 24px;">
                    ${months.map(m => `<div class="flex-1 text-center text-xs text-gray-500 leading-6">${m}</div>`).join('')}
                </div>
            `;
        }
        
        function renderExpenseTable() {
            const filterType = document.getElementById('filterType').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            
            let filtered = expenses;
            if (filterType) {
                filtered = filtered.filter(e => e.type === filterType);
            }
            if (startDate) {
                filtered = filtered.filter(e => e.date >= startDate);
            }
            if (endDate) {
                filtered = filtered.filter(e => e.date <= endDate);
            }
            
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filtered.slice(start, end);
            
            const typeMap = {
                'filament': '耗材购买',
                'equipment': '设备配件',
                'electricity': '电费',
                'maintenance': '维护保养',
                'other': '其他'
            };
            
            const tbody = document.getElementById('expenseTableBody');
            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-gray-500">暂无费用记录</td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageData.map(record => {
                    const supplier = suppliers.find(s => s._id === record.supplierId);
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm text-gray-900">${new Date(record.date).toLocaleDateString('zh-CN')}</td>
                            <td class="px-4 py-3 text-sm">
                                <span class="px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-700">${typeMap[record.type] || record.type}</span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-900">${record.description || '-'}</td>
                            <td class="px-4 py-3 text-sm text-gray-900">${supplier ? supplier.name : '-'}</td>
                            <td class="px-4 py-3 text-sm text-right font-medium text-red-600">-¥${record.amount.toFixed(2)}</td>
                            <td class="px-4 py-3 text-center">
                                <button onclick="editExpense('${record._id}')" class="text-blue-500 hover:text-blue-700 mr-2">
                                    <i class="fa fa-pencil"></i>
                                </button>
                                <button onclick="deleteExpense('${record._id}')" class="text-red-500 hover:text-red-700">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            
            const pagination = document.getElementById('expensePagination');
            pagination.innerHTML = `
                <div class="text-sm text-gray-500">显示 ${start + 1}-${Math.min(end, filtered.length)} 条，共 ${filtered.length} 条</div>
                <div class="flex space-x-2">
                    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="px-3 py-1 border border-gray-300 rounded text-gray-500 hover:bg-gray-100 disabled:opacity-50">
                        <i class="fa fa-chevron-left"></i>
                    </button>
                    ${Array.from({length: totalPages}, (_, i) => i + 1).map(page => `
                        <button onclick="changePage(${page})" class="px-3 py-1 border border-gray-300 rounded ${page === currentPage ? 'bg-primary text-white' : 'text-gray-500 hover:bg-gray-100'}">${page}</button>
                    `).join('')}
                    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''} class="px-3 py-1 border border-gray-300 rounded text-gray-500 hover:bg-gray-100 disabled:opacity-50">
                        <i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            `;
        }
        
        function changePage(page) {
            const totalPages = Math.ceil(expenses.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderExpenseTable();
            }
        }
        
        function clearFilters() {
            document.getElementById('filterType').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            currentPage = 1;
            renderExpenseTable();
        }
        
        function openAddExpenseModal() {
            document.getElementById('addExpenseModal').classList.remove('hidden');
            document.getElementById('addExpenseModal').classList.add('flex');
            document.querySelector('input[name="date"]').value = new Date().toISOString().split('T')[0];
        }
        
        function closeAddExpenseModal() {
            document.getElementById('addExpenseModal').classList.add('hidden');
            document.getElementById('addExpenseModal').classList.remove('flex');
            document.getElementById('addExpenseForm').reset();
            document.getElementById('expenseModalTitle').textContent = '添加费用记录';
            document.getElementById('expenseModalSaveBtn').textContent = '保存';
            document.getElementById('editExpenseId').value = '';
        }
        
        function showMessage(message) {
            document.getElementById('messageContent').textContent = message;
            document.getElementById('messageModal').classList.remove('hidden');
            document.getElementById('messageModal').classList.add('flex');
        }
        
        function closeMessageModal() {
            document.getElementById('messageModal').classList.add('hidden');
            document.getElementById('messageModal').classList.remove('flex');
        }
        
        async function editExpense(id) {
            const record = expenses.find(r => r._id === id);
            if (!record) return;
            
            document.getElementById('expenseModalTitle').textContent = '编辑费用记录';
            document.getElementById('expenseModalSaveBtn').textContent = '更新';
            document.getElementById('editExpenseId').value = id;
            
            document.querySelector('select[name="type"]').value = record.type;
            document.querySelector('input[name="amount"]').value = record.amount;
            document.querySelector('input[name="date"]').value = record.date.split('T')[0];
            document.querySelector('textarea[name="description"]').value = record.description || '';
            const channelSelect = document.querySelector('select[name="channelId"]');
            if (channelSelect) channelSelect.value = record.supplierId || '';
            
            document.getElementById('addExpenseModal').classList.remove('hidden');
            document.getElementById('addExpenseModal').classList.add('flex');
        }
        
        async function deleteExpense(id) {
            if (!confirm('确定要删除这条费用记录吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/expense-records/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('删除成功！');
                    loadExpenses();
                }
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败：网络错误');
            }
        }
        
        function updateSiteName() {
            const siteTitle = document.getElementById('siteTitle');
            const savedName = localStorage.getItem('siteName') || 'Leo的百宝箱';
            siteTitle.textContent = savedName;
        }
        
        function initSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarItems = document.querySelectorAll('.sidebar-item span');
            const siteTitle = document.getElementById('siteTitle');
            
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('w-16');
                sidebar.classList.remove('w-64');
                sidebarItems.forEach(item => item.classList.add('hidden'));
                if (siteTitle) siteTitle.classList.add('hidden');
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-angle-left');
                    icon.classList.add('fa-angle-right');
                }
            }
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-16');
                
                sidebarItems.forEach(item => {
                    item.classList.toggle('hidden');
                });
                
                if (siteTitle) {
                    siteTitle.classList.toggle('hidden');
                }
                
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-angle-left');
                    icon.classList.toggle('fa-angle-right');
                }
                
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('w-16'));
            });
        }
        
        document.addEventListener('DOMContentLoaded', async function() {
            updateSiteName();
            await loadExpenseSettings();
            loadSuppliers();
            loadExpenses();
            initSidebarToggle();
            
            document.getElementById('settingsBtn')?.addEventListener('click', () => {
                document.getElementById('settingsModal').classList.remove('hidden');
            });
            
            document.getElementById('closeModal')?.addEventListener('click', () => {
                document.getElementById('settingsModal').classList.add('hidden');
            });
            
            document.getElementById('addExpenseType')?.addEventListener('click', () => {
                const input = document.getElementById('newExpenseType');
                const label = input?.value.trim();
                if (label) {
                    const id = label.toLowerCase().replace(/\s+/g, '-');
                    if (!expenseTypes.find(t => t.id === id)) {
                        expenseTypes.push({ id, label });
                        saveExpenseSettings();
                        renderExpenseTypesSettings();
                        updateExpenseTypeSelect();
                        input.value = '';
                    }
                }
            });
            
            document.getElementById('addExpenseChannel')?.addEventListener('click', () => {
                const input = document.getElementById('newExpenseChannel');
                const label = input?.value.trim();
                if (label) {
                    const id = label.toLowerCase().replace(/\s+/g, '-');
                    if (!expenseChannels.find(c => c.id === id)) {
                        expenseChannels.push({ id, label });
                        saveExpenseSettings();
                        renderExpenseChannelsSettings();
                        updateChannelSelect();
                        input.value = '';
                    }
                }
            });

            document.getElementById('expenseTypeColorSelect')?.addEventListener('change', () => {
                const typeId = document.getElementById('expenseTypeColorSelect').value;
                const picker = document.getElementById('expenseTypeColorPicker');
                if (typeId && dbExpenseTypeColors[typeId]) {
                    picker.value = dbExpenseTypeColors[typeId];
                } else {
                    picker.value = '#3b82f6';
                }
            });

            document.getElementById('saveExpenseTypeColor')?.addEventListener('click', async () => {
                const typeId = document.getElementById('expenseTypeColorSelect').value;
                const color = document.getElementById('expenseTypeColorPicker').value;
                console.log('保存颜色按钮被点击');
                console.log('选择的费用类型:', typeId);
                console.log('选择的颜色:', color);
                if (!typeId) {
                    alert('请先选择一个费用类型');
                    return;
                }
                dbExpenseTypeColors[typeId] = color;
                console.log('准备发送的 dbExpenseTypeColors:', dbExpenseTypeColors);
                try {
                    console.log('发送请求到:', `${API_BASE_URL}/expense-settings`);
                    const response = await fetch(`${API_BASE_URL}/expense-settings`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ expenseTypeColors: dbExpenseTypeColors })
                    });
                    console.log('收到响应:', response.status);
                    const data = await response.json();
                    console.log('响应数据:', data);
                    renderExpenseTypesSettings();
                    renderTypeDistribution();
                    alert('颜色已保存！');
                } catch (error) {
                    console.error('保存颜色失败:', error);
                    alert('保存失败: ' + error.message);
                }
            });

            document.getElementById('saveSettings')?.addEventListener('click', async () => {
                console.log('保存设置被点击');
                console.log('expenseTypes:', expenseTypes);
                console.log('expenseChannels:', expenseChannels);
                
                try {
                    const response = await fetch(`${API_BASE_URL}/expense-settings`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ expenseTypes, expenseChannels })
                    });
                    const data = await response.json();
                    console.log('保存结果:', data);
                    
                    if (data.success) {
                        alert('设置已保存！');
                        document.getElementById('settingsModal').classList.add('hidden');
                    } else {
                        alert('保存失败: ' + (data.message || '未知错误'));
                    }
                } catch (error) {
                    console.error('保存失败:', error);
                    alert('保存失败: ' + error.message);
                }
            });
            
            document.getElementById('addExpenseForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                
                const record = {
                    type: formData.get('type'),
                    amount: parseFloat(formData.get('amount')),
                    date: formData.get('date'),
                    description: formData.get('description'),
                    supplierId: formData.get('channelId') || null
                };
                
                const editId = document.getElementById('editExpenseId').value;
                
                try {
                    const url = editId ? `${API_BASE_URL}/expense-records/${editId}` : `${API_BASE_URL}/expense-records`;
                    const method = editId ? 'PUT' : 'POST';
                    
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(record)
                    });
                    const data = await response.json();
                    if (data.success) {
                        showMessage(editId ? '更新成功！' : '添加成功！');
                        closeAddExpenseModal();
                        loadExpenses();
                    } else {
                        showMessage((editId ? '更新' : '添加') + '失败：' + data.message);
                    }
                } catch (error) {
                    console.error((editId ? '更新' : '添加') + '失败:', error);
                    showMessage((editId ? '更新' : '添加') + '失败：网络错误');
                }
            });
            
            document.getElementById('yearSelect').addEventListener('change', renderMonthlyChart);
            document.getElementById('expenseRangeSelect').addEventListener('change', function() {
                updateStatistics();
                renderTypeDistribution();
            });
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('add') === 'true') {
                openAddExpenseModal();
            }
        });
    </script>
</body>
</html>
