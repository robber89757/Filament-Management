<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商管理 - 3D打印耗材管理系统</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f57c00',
                        secondary: '#fff3e0',
                        dark: '#212121',
                        gray: {
                            100: '#f5f5f5',
                            200: '#eeeeee',
                            300: '#f0f0f0',
                            500: '#666666',
                            700: '#999999'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-item {
            display: flex;
            align-items: center;
            height: 56px;
            padding: 0 16px;
            color: #6B7280;
            transition: background-color 0.2s;
            margin-bottom: 8px;
            border-radius: 8px;
            margin-left: 8px;
            margin-right: 8px;
        }
        .sidebar-item:hover {
            background-color: #E5E7EB;
        }
        .sidebar-active {
            background-color: #F97316 !important;
            color: white !important;
            border-left: 4px solid #EA580C;
        }
        .btn-primary {
            @apply bg-primary text-white px-4 py-2 rounded-md hover:bg-opacity-90 transition-colors;
        }
        .btn-outline {
            @apply border border-gray-300 text-gray-600 px-4 py-2 rounded-md hover:bg-gray-100 transition-colors;
        }
        .no-spin-button::-webkit-inner-spin-button,
        .no-spin-button::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .no-spin-button {
            -moz-appearance: textfield;
        }
    </style>
    <script>
        (function() {
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                document.write('<style id="sidebar-init-style">body { visibility: hidden; }</style>');
                document.addEventListener('DOMContentLoaded', function() {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarItems = document.querySelectorAll('.sidebar-item span');
                    const siteTitle = document.getElementById('siteTitle');
                    const sidebarToggle = document.getElementById('sidebarToggle');
                    
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    sidebarItems.forEach(item => item.classList.add('hidden'));
                    if (siteTitle) siteTitle.classList.add('hidden');
                    const icon = sidebarToggle.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-angle-left');
                        icon.classList.add('fa-angle-right');
                    }
                    
                    document.getElementById('sidebar-init-style').remove();
                    document.body.style.visibility = 'visible';
                });
            }
        })();
    </script>
</head>
<body class="bg-gray-100 font-sans">

                    </li>
                    <li>

                        </a>
                    </li>
                    <li>

    <script src="settings.js"></script>
    <script>
        const API_BASE_URL = '/api';
        let suppliers = [];
        let spools = [];
        let expenses = [];
        
        async function loadData() {
            await Promise.all([
                loadSuppliers(),
                loadSpools(),
                loadExpenses()
            ]);
            updateStatistics();
            renderSupplierTable();
        }
        
        async function loadSuppliers() {
            try {
                const response = await fetch(`${API_BASE_URL}/suppliers`);
                const data = await response.json();
                if (data.success) {
                    suppliers = data.data;
                }
            } catch (error) {
                console.error('加载供应商失败:', error);
            }
        }
        
        async function loadSpools() {
            try {
                const response = await fetch(`${API_BASE_URL}/spools`);
                const data = await response.json();
                if (data.success) {
                    spools = data.data;
                }
            } catch (error) {
                console.error('加载耗材失败:', error);
            }
        }
        
        async function loadExpenses() {
            try {
                const response = await fetch(`${API_BASE_URL}/expense-records`);
                const data = await response.json();
                if (data.success) {
                    expenses = data.data;
                }
            } catch (error) {
                console.error('加载费用记录失败:', error);
            }
        }
        
        function updateStatistics() {
            document.getElementById('totalSuppliers').textContent = suppliers.length;
            
            const linkedSpools = spools.filter(s => s.supplierId).length;
            document.getElementById('linkedSpools').textContent = linkedSpools;
            
            const totalPurchase = expenses
                .filter(e => e.supplierId)
                .reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('totalPurchase').textContent = `¥${totalPurchase.toFixed(2)}`;
        }
        
        function renderSupplierTable() {
            const searchTerm = document.getElementById('searchSupplier').value.toLowerCase();
            const filtered = suppliers.filter(s => 
                s.name.toLowerCase().includes(searchTerm) ||
                (s.contact && s.contact.toLowerCase().includes(searchTerm)) ||
                (s.phone && s.phone.includes(searchTerm))
            );
            
            const tbody = document.getElementById('supplierTableBody');
            
            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-4 py-8 text-center text-gray-500">暂无供应商信息</td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filtered.map(supplier => {
                const linkedSpoolCount = spools.filter(s => s.supplierId === supplier._id).length;
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3">
                            <div class="font-medium text-dark">${supplier.name}</div>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-600">${supplier.contact || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${supplier.phone || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${supplier.email || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${supplier.address || '-'}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded text-xs font-medium ${linkedSpoolCount > 0 ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600'}">
                                ${linkedSpoolCount} 个耗材
                            </span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="showSupplierDetail('${supplier._id}')" class="text-blue-500 hover:text-blue-700 mr-2">
                                <i class="fa fa-eye"></i>
                            </button>
                            <button onclick="editSupplier('${supplier._id}')" class="text-primary hover:text-opacity-80 mr-2">
                                <i class="fa fa-edit"></i>
                            </button>
                            <button onclick="deleteSupplier('${supplier._id}')" class="text-red-500 hover:text-red-700">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function showSupplierDetail(id) {
            const supplier = suppliers.find(s => s._id === id);
            if (!supplier) return;
            
            const linkedSpools = spools.filter(s => s.supplierId === id);
            const supplierExpenses = expenses.filter(e => e.supplierId === id);
            const totalPurchase = supplierExpenses.reduce((sum, e) => sum + e.amount, 0);
            
            const detail = document.getElementById('supplierDetail');
            detail.innerHTML = `
                <div class="space-y-3">
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">供应商名称:</span>
                        <span class="font-medium">${supplier.name}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">联系人:</span>
                        <span class="font-medium">${supplier.contact || '-'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">联系电话:</span>
                        <span class="font-medium">${supplier.phone || '-'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">邮箱:</span>
                        <span class="font-medium">${supplier.email || '-'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">地址:</span>
                        <span class="font-medium">${supplier.address || '-'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">备注:</span>
                        <span class="font-medium">${supplier.notes || '-'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">关联耗材:</span>
                        <span class="font-medium">${linkedSpools.length} 个</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">采购总额:</span>
                        <span class="font-medium text-primary">¥${totalPurchase.toFixed(2)}</span>
                    </div>
                    ${linkedSpools.length > 0 ? `
                        <div class="mt-4">
                            <h4 class="font-medium text-dark mb-2">关联耗材列表</h4>
                            <div class="space-y-2">
                                ${linkedSpools.map(spool => `
                                    <div class="flex items-center p-2 bg-gray-50 rounded">
                                        <div class="w-4 h-4 rounded-full mr-2" style="background-color: ${spool.colorCode || '#3b82f6'}"></div>
                                        <span class="text-sm">${spool.brand} - ${spool.color} ${spool.material}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('supplierDetailModal').classList.remove('hidden');
            document.getElementById('supplierDetailModal').classList.add('flex');
        }
        
        function closeSupplierDetailModal() {
            document.getElementById('supplierDetailModal').classList.add('hidden');
            document.getElementById('supplierDetailModal').classList.remove('flex');
        }
        
        function openAddSupplierModal() {
            document.getElementById('modalTitle').textContent = '添加供应商';
            document.getElementById('supplierId').value = '';
            document.getElementById('addSupplierForm').reset();
            document.getElementById('addSupplierModal').classList.remove('hidden');
            document.getElementById('addSupplierModal').classList.add('flex');
        }
        
        function closeAddSupplierModal() {
            document.getElementById('addSupplierModal').classList.add('hidden');
            document.getElementById('addSupplierModal').classList.remove('flex');
        }
        
        function showMessage(message) {
            document.getElementById('messageContent').textContent = message;
            document.getElementById('messageModal').classList.remove('hidden');
            document.getElementById('messageModal').classList.add('flex');
        }
        
        function closeMessageModal() {
            document.getElementById('messageModal').classList.add('hidden');
            document.getElementById('messageModal').classList.remove('flex');
        }
        
        function editSupplier(id) {
            const supplier = suppliers.find(s => s._id === id);
            if (!supplier) return;
            
            document.getElementById('modalTitle').textContent = '编辑供应商';
            document.getElementById('supplierId').value = id;
            document.querySelector('input[name="name"]').value = supplier.name;
            document.querySelector('input[name="contact"]').value = supplier.contact || '';
            document.querySelector('input[name="phone"]').value = supplier.phone || '';
            document.querySelector('input[name="email"]').value = supplier.email || '';
            document.querySelector('input[name="address"]').value = supplier.address || '';
            document.querySelector('textarea[name="notes"]').value = supplier.notes || '';
            
            document.getElementById('addSupplierModal').classList.remove('hidden');
            document.getElementById('addSupplierModal').classList.add('flex');
        }
        
        async function deleteSupplier(id) {
            if (!confirm('确定要删除这个供应商吗？关联的耗材将不再关联到此供应商。')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/suppliers/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('删除成功！');
                    loadData();
                } else {
                    showMessage('删除失败：' + data.message);
                }
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败：网络错误');
            }
        }
        
        function initSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarItems = document.querySelectorAll('.sidebar-item span');
            const siteTitle = document.getElementById('siteTitle');
            
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('w-16');
                sidebar.classList.remove('w-64');
                sidebarItems.forEach(item => item.classList.add('hidden'));
                if (siteTitle) siteTitle.classList.add('hidden');
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-angle-left');
                    icon.classList.add('fa-angle-right');
                }
            }
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-16');
                
                sidebarItems.forEach(item => {
                    item.classList.toggle('hidden');
                });
                
                if (siteTitle) {
                    siteTitle.classList.toggle('hidden');
                }
                
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-angle-left');
                    icon.classList.toggle('fa-angle-right');
                }
                
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('w-16'));
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            initPageSettings();
            loadData();
            initSidebarToggle();
            
            document.getElementById('addSupplierForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const id = document.getElementById('supplierId').value;
                const supplierData = {
                    name: this.name.value,
                    contact: this.contact.value,
                    phone: this.phone.value,
                    email: this.email.value,
                    address: this.address.value,
                    notes: this.notes.value
                };
                
                try {
                    const url = id ? `${API_BASE_URL}/suppliers/${id}` : `${API_BASE_URL}/suppliers`;
                    const method = id ? 'PUT' : 'POST';
                    
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(supplierData)
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        showMessage(id ? '更新成功！' : '添加成功！');
                        closeAddSupplierModal();
                        loadData();
                    } else {
                        showMessage('保存失败：' + data.message);
                    }
                } catch (error) {
                    console.error('保存失败:', error);
                    showMessage('保存失败：网络错误');
                }
            });
        });
    </script>
</body>
</html>
