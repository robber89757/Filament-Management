<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 3D打印耗材管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f57c00',
                        dark: '#212121'
                    }
                }
            }
        }
    </script>
    <script>
        (function() {
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                document.write('<style id="sidebar-init-style">body { visibility: hidden; }</style>');
                document.addEventListener('DOMContentLoaded', function() {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarItems = document.querySelectorAll('.sidebar-item span');
                    const siteTitle = document.getElementById('siteTitle');
                    const sidebarToggle = document.getElementById('sidebarToggle');
                    
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    sidebarItems.forEach(item => item.classList.add('hidden'));
                    if (siteTitle) siteTitle.classList.add('hidden');
                    const icon = sidebarToggle.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-angle-left');
                        icon.classList.add('fa-angle-right');
                    }
                    
                    document.getElementById('sidebar-init-style').remove();
                    document.body.style.visibility = 'visible';
                });
            }
        })();
    </script>
</head>

    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script>
        async function loadStatistics() {
            try {
                const [spoolsRes, expensesRes, salesRes, settingsRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/spools`),
                    fetch(`${API_BASE_URL}/expense-records`),
                    fetch(`${API_BASE_URL}/sales-records`),
                    fetch(`${API_BASE_URL}/expense-settings`)
                ]);

                const spoolsData = await spoolsRes.json();
                const expensesData = await expensesRes.json();
                const salesData = await salesRes.json();
                const settingsData = await settingsRes.json();

                let expenseTypes = [];
                if (settingsData.success && settingsData.data && settingsData.data.expenseTypes) {
                    expenseTypes = settingsData.data.expenseTypes;
                }

                if (spoolsData.success) {
                    const spools = spoolsData.data;
                    document.getElementById('totalSpools').textContent = spools.length;

                    const lowStock = spools.filter(s => {
                        const ratio = s.remainingWeight / s.initialWeight;
                        return ratio < 0.2 && ratio > 0;
                    });

                    if (lowStock.length > 0) {
                        document.getElementById('lowStockWarning').classList.remove('hidden');
                    }

                    renderInventoryOverview(spools);
                    renderMaterialDistribution(spools);
                }

                if (expensesData.success) {
                    const expenses = expensesData.data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    const total = expenses.reduce((sum, e) => sum + e.amount, 0);
                    document.getElementById('totalExpense').textContent = `¥${total.toFixed(0)}`;

                    const currentMonth = new Date().toISOString().substring(0, 7);
                    const monthTotal = expenses
                        .filter(e => e.date.startsWith(currentMonth))
                        .reduce((sum, e) => sum + e.amount, 0);
                    document.getElementById('monthExpense').textContent = `¥${monthTotal.toFixed(0)}`;

                    renderRecentExpenses(expenses, expenseTypes);
                }

                if (salesData.success) {
                    const sales = salesData.data;
                    const currentMonth = new Date().toISOString().substring(0, 7);
                    const monthSalesTotal = sales
                        .filter(s => s.date.startsWith(currentMonth))
                        .reduce((sum, s) => sum + s.amount, 0);
                    document.getElementById('monthSales').textContent = `¥${monthSalesTotal.toFixed(0)}`;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        function renderInventoryOverview(spools) {
            const container = document.getElementById('inventoryOverview');
            if (spools.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">暂无耗材数据</div>';
                return;
            }
            
            const categories = [
                { name: '充足', filter: s => s.remainingWeight / s.initialWeight >= 0.5, color: 'bg-green-500', icon: 'fa-check-circle' },
                { name: '一般', filter: s => s.remainingWeight / s.initialWeight >= 0.2 && s.remainingWeight / s.initialWeight < 0.5, color: 'bg-yellow-500', icon: 'fa-exclamation-circle' },
                { name: '不足', filter: s => s.remainingWeight / s.initialWeight < 0.2 && s.remainingWeight > 0, color: 'bg-red-500', icon: 'fa-warning' },
                { name: '已用完', filter: s => s.remainingWeight <= 0, color: 'bg-gray-500', icon: 'fa-times-circle' }
            ];
            
            container.innerHTML = categories.map(cat => {
                const items = spools.filter(cat.filter);
                if (items.length === 0) return '';
                
                return `<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center">
                        <div class="w-8 h-8 ${cat.color} rounded-full flex items-center justify-center mr-3">
                            <i class="fa ${cat.icon} text-white text-sm"></i>
                        </div>
                        <div>
                            <div class="font-medium text-dark">${cat.name}</div>
                            <div class="text-xs text-gray-500">${items.length} 个耗材</div>
                        </div>
                    </div>
                    <div class="text-sm text-gray-500">
                        ${items.slice(0, 2).map(s => s.color).join(', ')}${items.length > 2 ? '...' : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function renderMaterialDistribution(spools) {
            const container = document.getElementById('materialDistribution');
            if (spools.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">暂无数据</div>';
                return;
            }
            
            const materialCount = {};
            spools.forEach(s => {
                const material = s.material || '其他';
                materialCount[material] = (materialCount[material] || 0) + 1;
            });
            
            const colors = { 'PLA': 'bg-blue-500', 'PETG': 'bg-green-500', 'ABS': 'bg-red-500', 'TPU': 'bg-yellow-500', 'ASA': 'bg-purple-500', '其他': 'bg-gray-500' };
            
            container.innerHTML = Object.entries(materialCount).map(([material, count]) => {
                const percentage = (count / spools.length * 100).toFixed(0);
                const color = colors[material] || 'bg-gray-500';
                
                return `<div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-3 h-3 ${color} rounded-full mr-2"></div>
                        <span class="text-sm text-dark">${material}</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-24 h-2 bg-gray-200 rounded-full mr-2 overflow-hidden">
                            <div class="h-full ${color} rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        <span class="text-sm text-gray-500 w-12">${count}个</span>
                    </div>
                </div>`;
            }).join('');
        }
        
        function renderRecentExpenses(expenses, expenseTypes) {
            const container = document.getElementById('recentExpenses');
            if (expenses.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">暂无费用记录</div>';
                return;
            }

            const colorMap = {
                'filament': 'bg-blue-100 text-blue-700',
                'equipment': 'bg-green-100 text-green-700',
                'electricity': 'bg-yellow-100 text-yellow-700',
                'maintenance': 'bg-purple-100 text-purple-700',
                'other': 'bg-gray-100 text-gray-700'
            };

            const recent = expenses.slice(0, 5);

            container.innerHTML = recent.map(expense => {
                const typeInfo = expenseTypes.find(t => t.id === expense.type);
                const label = typeInfo ? typeInfo.label : (expense.type || '其他');
                const color = colorMap[expense.type] || colorMap.other;
                return `<div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg transition-colors">
                    <div class="flex items-center flex-1 min-w-0">
                        <span class="inline-flex items-center justify-center px-2 py-1 rounded text-xs font-medium ${color} mr-3 w-16 text-center flex-shrink-0">${label}</span>
                        <div class="min-w-0">
                            <div class="text-sm text-dark truncate">${expense.description || '无描述'}</div>
                            <div class="text-xs text-gray-500">${new Date(expense.date).toLocaleDateString('zh-CN')}</div>
                        </div>
                    </div>
                    <span class="font-medium text-red-600 flex-shrink-0 ml-3">-¥${expense.amount.toFixed(2)}</span>
                </div>`;
            }).join('');
        }
        
        function initSettings() {
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeModal = document.getElementById('closeModal');
            const saveSettings = document.getElementById('saveSettings');
            const siteNameInput = document.getElementById('siteNameInput');
            const siteTitle = document.getElementById('siteTitle');
            
            const savedName = localStorage.getItem('siteName') || 'Leo的百宝箱';
            siteTitle.textContent = savedName;
            siteNameInput.value = savedName;
            
            settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
            closeModal.addEventListener('click', () => settingsModal.classList.add('hidden'));
            
            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) settingsModal.classList.add('hidden');
            });
            
            saveSettings.addEventListener('click', () => {
                const newName = siteNameInput.value.trim() || 'Leo的百宝箱';
                localStorage.setItem('siteName', newName);
                siteTitle.textContent = newName;
                settingsModal.classList.add('hidden');
            });
        }
        
        function initSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarItems = document.querySelectorAll('.sidebar-item span');
            const siteTitle = document.getElementById('siteTitle');
            
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('w-16');
                sidebar.classList.remove('w-64');
                sidebarItems.forEach(item => item.classList.add('hidden'));
                if (siteTitle) siteTitle.classList.add('hidden');
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-angle-left');
                    icon.classList.add('fa-angle-right');
                }
            }
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-16');
                
                sidebarItems.forEach(item => {
                    item.classList.toggle('hidden');
                });
                
                if (siteTitle) {
                    siteTitle.classList.toggle('hidden');
                }
                
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-angle-left');
                    icon.classList.toggle('fa-angle-right');
                }
                
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('w-16'));
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadStatistics();
            initSettings();
            initSidebarToggle();
        });
    </script>
</body>
