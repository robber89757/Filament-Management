        (function() {

            if (isCollapsed) {
                document.write('<style id="sidebar-init-style">body { visibility: hidden; }</style>');
                document.addEventListener('DOMContentLoaded', function() {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarItems = document.querySelectorAll('.sidebar-item span');
                    const siteTitle = document.getElementById('siteTitle');
                    const sidebarToggle = document.getElementById('sidebarToggle');
                    
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    sidebarItems.forEach(item => item.classList.add('hidden'));
                    if (siteTitle) siteTitle.classList.add('hidden');
                    const icon = sidebarToggle.querySelector('i');

                        icon.classList.add('fa-angle-right');

                    document.getElementById('sidebar-init-style').remove();

    <script src="settings.js"></script>
    <script>
        const API_BASE_URL = '/api';
        let priceFormulas = {};
        let calculationHistory = [];

        async function loadFormulas() {
            const savedFormulas = localStorage.getItem('priceFormulas');
            if (savedFormulas) {
                priceFormulas = JSON.parse(savedFormulas);
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/price-formulas`);
                const data = await response.json();
                if (data.success && data.data) {
                    priceFormulas = data.data;
                    localStorage.setItem('priceFormulas', JSON.stringify(data.data));
                }
            } catch (error) {
                console.error('加载公式失败:', error);
            }
        }

        function updatePriceDisplay() {
            const materialType = document.getElementById('materialType').value;
            const materialWeight = parseFloat(document.getElementById('materialWeight').value) || 0;
            const printTime = parseFloat(document.getElementById('printTime').value) || 0;

            const costs = priceFormulas.materialCosts || {};
            const materialCostPerGram = costs[materialType] || 0.05;

            const materialCost = materialWeight * materialCostPerGram;
            const timeCost = printTime * (priceFormulas.hourlyRate || 10);
            const electricityCost = printTime * (priceFormulas.electricityRate || 1.5);
            const baseCost = priceFormulas.baseFee || 5;

            const subtotal = materialCost + timeCost + electricityCost + baseCost;
            const markup = priceFormulas.markup || 1.5;
            const totalPrice = subtotal * markup;

            document.getElementById('materialCost').textContent = `¥${materialCost.toFixed(2)}`;
            document.getElementById('timeCost').textContent = `¥${timeCost.toFixed(2)}`;
            document.getElementById('electricityCost').textContent = `¥${electricityCost.toFixed(2)}`;
            document.getElementById('baseCost').textContent = `¥${baseCost.toFixed(2)}`;
            document.getElementById('subtotal').textContent = `¥${subtotal.toFixed(2)}`;
            document.getElementById('totalPrice').textContent = `¥${totalPrice.toFixed(2)}`;
        }

        function calculatePrice() {
            updatePriceDisplay();

            const materialType = document.getElementById('materialType').value;
            const materialWeight = parseFloat(document.getElementById('materialWeight').value) || 0;
            const printTime = parseFloat(document.getElementById('printTime').value) || 0;

            const costs = priceFormulas.materialCosts || {};
            const materialCostPerGram = costs[materialType] || 0.05;

            const materialCost = materialWeight * materialCostPerGram;
            const timeCost = printTime * (priceFormulas.hourlyRate || 10);
            const electricityCost = printTime * (priceFormulas.electricityRate || 1.5);
            const baseCost = priceFormulas.baseFee || 5;

            const subtotal = materialCost + timeCost + electricityCost + baseCost;
            const markup = priceFormulas.markup || 1.5;
            const totalPrice = subtotal * markup;

            const record = {
                timestamp: new Date().toISOString(),
                materialType,
                materialWeight,
                printTime,
                materialCost,
                timeCost,
                electricityCost,
                baseCost,
                subtotal,
                markup,
                totalPrice
            };

            calculationHistory.unshift(record);
            if (calculationHistory.length > 10) {
                calculationHistory.pop();
            }

            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');

            if (calculationHistory.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">暂无历史记录</p>';
                return;
            }

            container.innerHTML = calculationHistory.map((record, index) => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition-colors" onclick="showHistoryDetail(${index})">
                    <div>
                        <span class="font-medium text-dark">${record.materialType}</span>
                        <span class="text-gray-500 text-sm ml-2">${record.materialWeight}g / ${record.printTime}h</span>
                    </div>
                    <div class="text-right">
                        <span class="font-semibold text-primary">¥${record.totalPrice.toFixed(2)}</span>
                        <span class="text-gray-400 text-xs block">${new Date(record.timestamp).toLocaleString('zh-CN')}</span>
                    </div>
                </div>
            `).join('');
        }

        function showHistoryDetail(index) {
            const record = calculationHistory[index];
            const detail = document.getElementById('historyDetail');

            detail.innerHTML = `
                <div class="space-y-3">
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">材料类型:</span>
                        <span class="font-medium">${record.materialType}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">材料重量:</span>
                        <span class="font-medium">${record.materialWeight}g</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">打印时长:</span>
                        <span class="font-medium">${record.printTime}h</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">材料成本:</span>
                        <span class="font-medium">¥${record.materialCost.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">时间成本:</span>
                        <span class="font-medium">¥${record.timeCost.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">电费:</span>
                        <span class="font-medium">¥${record.electricityCost.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">基础费用:</span>
                        <span class="font-medium">¥${record.baseCost.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">小计:</span>
                        <span class="font-medium">¥${record.subtotal.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">利润率:</span>
                        <span class="font-medium">${record.markup * 100}%</span>
                    </div>
                    <div class="flex justify-between py-3 bg-secondary rounded-lg px-3 mt-2">
                        <span class="font-semibold text-primary">预估报价:</span>
                        <span class="font-bold text-primary text-xl">¥${record.totalPrice.toFixed(2)}</span>
                    </div>
                </div>
            `;

            document.getElementById('historyModal').classList.remove('hidden');
            document.getElementById('historyModal').classList.add('flex');
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
            document.getElementById('historyModal').classList.remove('flex');
        }

        function showMessage(message) {
            document.getElementById('messageContent').textContent = message;
            document.getElementById('messageModal').classList.remove('hidden');
            document.getElementById('messageModal').classList.add('flex');
        }

        function closeMessageModal() {
            document.getElementById('messageModal').classList.add('hidden');
            document.getElementById('messageModal').classList.remove('flex');
        }

        function resetForm() {
            document.getElementById('materialWeight').value = 50;
            document.getElementById('printTime').value = 5;
            calculatePrice();
        }

        function updateSiteName() {
            const siteTitle = document.getElementById('siteTitle');
            const savedName = localStorage.getItem('siteName') || 'Leo的百宝箱';
            siteTitle.textContent = savedName;
        }

        function initSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarItems = document.querySelectorAll('.sidebar-item span');
            const siteTitle = document.getElementById('siteTitle');
            
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('w-16');
                sidebar.classList.remove('w-64');
                sidebarItems.forEach(item => item.classList.add('hidden'));
                if (siteTitle) siteTitle.classList.add('hidden');
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-angle-left');
                    icon.classList.add('fa-angle-right');
                }
            }
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-16');
                
                sidebarItems.forEach(item => {
                    item.classList.toggle('hidden');
                });
                
                if (siteTitle) {
                    siteTitle.classList.toggle('hidden');
                }
                
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-angle-left');
                    icon.classList.toggle('fa-angle-right');
                }
                
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('w-16'));
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            initPageSettings();
            updateSiteName();
            loadFormulas();
            initSidebarToggle();

            document.getElementById('materialType').addEventListener('change', updatePriceDisplay);
            document.getElementById('materialWeight').addEventListener('input', updatePriceDisplay);
            document.getElementById('printTime').addEventListener('input', updatePriceDisplay);
        });
    </script>
</body>
</html>
