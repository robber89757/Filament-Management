    <script>
        (function() {
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                document.write('<style id="sidebar-init-style">body { visibility: hidden; }</style>');
                document.addEventListener('DOMContentLoaded', function() {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarItems = document.querySelectorAll('.sidebar-item span');
                    const siteTitle = document.getElementById('siteTitle');
                    const sidebarToggle = document.getElementById('sidebarToggle');
                    
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    sidebarItems.forEach(item => item.classList.add('hidden'));
                    if (siteTitle) siteTitle.classList.add('hidden');
                    const icon = sidebarToggle.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-angle-left');
                        icon.classList.add('fa-angle-right');
                    }
                    
                    document.getElementById('sidebar-init-style').remove();
                    document.body.style.visibility = 'visible';
                });
            }
        })();

    <script>
        const API_BASE_URL = '/api';
        let spools = [];
        let suppliers = [];
        let currentPage = 1;
        const pageSize = 10;
        
        async function loadData() {
            const tbody = document.getElementById('filamentTableBody');
            tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-gray-500"><i class="fa fa-spinner fa-spin mr-2"></i>正在加载数据...</td></tr>';

            try {
                await loadSpools();
                await loadSuppliers();
                updateStatistics();
                renderFilamentTable();
            } catch (error) {
                console.error('加载数据失败:', error);
                tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-red-500">加载数据失败，请刷新页面重试</td></tr>';
                showMessage('加载数据失败，请检查网络连接');
            }
        }
        
        async function loadSpools() {
            try {
                const response = await fetch(`${API_BASE_URL}/spools`);
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                const data = await response.json();
                if (data.success) {
                    spools = data.data.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
                }
            } catch (error) {
                console.error('加载耗材失败:', error);
                showMessage('加载耗材数据失败，请检查网络连接');
                spools = [];
            }
        }
        
        async function loadSuppliers() {
            try {
                const response = await fetch(`${API_BASE_URL}/suppliers`);
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                const data = await response.json();
                if (data.success) {
                    suppliers = data.data;
                    updateSupplierSelects();
                }
            } catch (error) {
                console.error('加载供应商失败:', error);
                showMessage('加载供应商数据失败，请检查网络连接');
                suppliers = [];
            }
        }
        
        function updateSupplierSelects() {
            const options = '<option value="">无</option>' + 
                suppliers.map(s => `<option value="${s._id}">${s.name}</option>`).join('');
            document.getElementById('supplierSelect').innerHTML = options;
            document.getElementById('filterSupplier').innerHTML = '<option value="">全部供应商</option>' + 
                suppliers.map(s => `<option value="${s._id}">${s.name}</option>`).join('');
        }
        
        function updateStatistics() {
            document.getElementById('totalCount').textContent = spools.length;
            
            const available = spools.filter(s => s.remainingWeight / s.initialWeight >= 0.5).length;
            const low = spools.filter(s => s.remainingWeight / s.initialWeight >= 0.2 && s.remainingWeight / s.initialWeight < 0.5).length;
            const empty = spools.filter(s => s.remainingWeight <= 0 || s.remainingWeight / s.initialWeight < 0.2).length;
            
            document.getElementById('availableCount').textContent = available;
            document.getElementById('lowCount').textContent = low;
            document.getElementById('emptyCount').textContent = empty;
        }
        
        function renderFilamentTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const materialFilter = document.getElementById('filterMaterial').value;
            const supplierFilter = document.getElementById('filterSupplier').value;
            
            let filtered = spools;
            
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    s.color.toLowerCase().includes(searchTerm) ||
                    s.brand.toLowerCase().includes(searchTerm) ||
                    (s.material && s.material.toLowerCase().includes(searchTerm))
                );
            }
            
            if (materialFilter) {
                filtered = filtered.filter(s => s.material === materialFilter);
            }
            
            if (supplierFilter) {
                filtered = filtered.filter(s => s.supplierId === supplierFilter);
            }
            
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filtered.slice(start, end);
            
            const tbody = document.getElementById('filamentTableBody');
            
            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="px-4 py-8 text-center text-gray-500">暂无耗材数据</td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageData.map(spool => {
                    const ratio = spool.remainingWeight / spool.initialWeight;
                    let statusClass, statusText;
                    if (ratio <= 0) {
                        statusClass = 'bg-red-100 text-red-700';
                        statusText = '已用完';
                    } else if (ratio < 0.2) {
                        statusClass = 'bg-red-100 text-red-700';
                        statusText = '不足';
                    } else if (ratio < 0.5) {
                        statusClass = 'bg-yellow-100 text-yellow-700';
                        statusText = '一般';
                    } else {
                        statusClass = 'bg-green-100 text-green-700';
                        statusText = '充足';
                    }
                    
                    const supplier = suppliers.find(s => s._id === spool.supplierId);
                    
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 rounded-full border-2 border-gray-300 flex-shrink-0" style="background-color: ${spool.colorCode || '#3b82f6'}"></div>
                                    <span class="ml-2 text-sm text-dark">${spool.color}</span>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-600">${supplier ? supplier.name : '-'}</td>
                            <td class="px-4 py-3 text-sm">
                                <span class="px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-700">${spool.material || '-'}</span>
                            </td>
                            <td class="px-4 py-3 text-sm text-dark">${spool.brand}</td>
                            <td class="px-4 py-3 text-sm text-gray-600">¥${(spool.price || 0).toFixed(2)}</td>
                            <td class="px-4 py-3">
                                <div class="flex items-center">
                                    <div class="w-20 h-2 bg-gray-200 rounded-full mr-2 overflow-hidden">
                                        <div class="h-full ${ratio < 0.2 ? 'bg-red-500' : ratio < 0.5 ? 'bg-yellow-500' : 'bg-green-500'}" style="width: ${Math.min(ratio * 100, 100)}%"></div>
                                    </div>
                                    <span class="text-sm ${ratio < 0.2 ? 'text-red-600' : 'text-gray-600'}">${spool.remainingWeight}g</span>
                                </div>
                                <span class="text-xs px-2 py-0.5 rounded ${statusClass}">${statusText}</span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-500">${new Date(spool.updatedAt).toLocaleDateString('zh-CN')}</td>
                            <td class="px-4 py-3 text-center">
                                <button onclick="showFilamentDetail('${spool._id}')" class="text-blue-500 hover:text-blue-700 mr-2" title="查看详情">
                                    <i class="fa fa-eye"></i>
                                </button>
                                <button onclick="cloneFilament('${spool._id}')" class="text-green-500 hover:text-green-700 mr-2" title="复制并新建">
                                    <i class="fa fa-copy"></i>
                                </button>
                                <button onclick="editFilament('${spool._id}')" class="text-primary hover:text-opacity-80 mr-2" title="编辑">
                                    <i class="fa fa-edit"></i>
                                </button>
                                <button onclick="deleteFilament('${spool._id}')" class="text-red-500 hover:text-red-700" title="删除">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            
            const pagination = document.getElementById('pagination');
            if (filtered.length === 0) {
                pagination.innerHTML = '<div class="text-sm text-gray-500">无数据</div>';
            } else {
                pagination.innerHTML = `
                    <div class="text-sm text-gray-500">显示 ${start + 1}-${Math.min(end, filtered.length)} 条，共 ${filtered.length} 条</div>
                    <div class="flex space-x-2">
                        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="px-3 py-1 border border-gray-300 rounded text-gray-500 hover:bg-gray-100 disabled:opacity-50">
                            <i class="fa fa-chevron-left"></i>
                        </button>
                        ${Array.from({length: totalPages}, (_, i) => i + 1).map(page => `
                            <button onclick="changePage(${page})" class="px-3 py-1 border border-gray-300 rounded ${page === currentPage ? 'bg-primary text-white' : 'text-gray-500 hover:bg-gray-100'}">${page}</button>
                        `).join('')}
                        <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="px-3 py-1 border border-gray-300 rounded text-gray-500 hover:bg-gray-100 disabled:opacity-50">
                            <i class="fa fa-chevron-right"></i>
                        </button>
                    </div>
                `;
            }
        }
        
        function changePage(page) {
            const totalPages = Math.ceil(spools.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderFilamentTable();
            }
        }
        
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterMaterial').value = '';
            document.getElementById('filterSupplier').value = '';
            currentPage = 1;
            renderFilamentTable();
        }
        
        function showFilamentDetail(id) {
            const spool = spools.find(s => s._id === id);
            if (!spool) return;
            
            const ratio = spool.remainingWeight / spool.initialWeight;
            const supplier = suppliers.find(s => s._id === spool.supplierId);
            
            const detail = document.getElementById('filamentDetail');
            detail.innerHTML = `
                <div class="flex items-center mb-4">
                    <div class="w-16 h-16 rounded-full border-4 border-gray-300" style="background-color: ${spool.colorCode || '#3b82f6'}"></div>
                    <div class="ml-4">
                        <h4 class="text-xl font-bold text-dark">${spool.brand} - ${spool.color}</h4>
                        <p class="text-gray-500">${spool.material} | ${spool.diameter}mm</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">供应商:</span>
                        <span class="font-medium">${supplier ? supplier.name : '-'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">购买价格:</span>
                        <span class="font-medium">¥${(spool.price || 0).toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">初始重量:</span>
                        <span class="font-medium">${spool.initialWeight}g</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">料盘重量:</span>
                        <span class="font-medium">${spool.spoolWeight || 140}g</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">剩余重量:</span>
                        <span class="font-medium">${spool.remainingWeight}g</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">净重(去皮):</span>
                        <span class="font-medium">${spool.remainingWeight - (spool.spoolWeight || 140)}g</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">剩余比例:</span>
                        <span class="font-medium">${(ratio * 100).toFixed(1)}%</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">入库日期:</span>
                        <span class="font-medium">${new Date(spool.storageDate).toLocaleDateString('zh-CN')}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b">
                        <span class="text-gray-600">最后更新:</span>
                        <span class="font-medium">${new Date(spool.updatedAt).toLocaleString('zh-CN')}</span>
                    </div>
                </div>
            `;
            
            document.getElementById('filamentDetailModal').classList.remove('hidden');
            document.getElementById('filamentDetailModal').classList.add('flex');
        }
        
        function closeFilamentDetailModal() {
            document.getElementById('filamentDetailModal').classList.add('hidden');
            document.getElementById('filamentDetailModal').classList.remove('flex');
        }
        
        function openAddFilamentModal() {
            document.getElementById('modalTitle').textContent = '添加耗材';
            document.getElementById('filamentId').value = '';
            document.getElementById('addFilamentForm').reset();
            document.getElementById('colorPicker').value = '#3b82f6';
            document.getElementById('colorHex').textContent = '#3b82f6';
            document.getElementById('addFilamentModal').classList.remove('hidden');
            document.getElementById('addFilamentModal').classList.add('flex');
        }
        
        function closeAddFilamentModal() {
            document.getElementById('addFilamentModal').classList.add('hidden');
            document.getElementById('addFilamentModal').classList.remove('flex');
        }
        
        function showMessage(message) {
            document.getElementById('messageContent').textContent = message;
            document.getElementById('messageModal').classList.remove('hidden');
            document.getElementById('messageModal').classList.add('flex');
        }
        
        function closeMessageModal() {
            document.getElementById('messageModal').classList.add('hidden');
            document.getElementById('messageModal').classList.remove('flex');
        }
        
        function cloneFilament(id) {
            const spool = spools.find(s => s._id === id);
            if (!spool) return;
            
            document.getElementById('modalTitle').textContent = '复制耗材';
            document.getElementById('filamentId').value = '';
            document.querySelector('select[name="brand"]').value = spool.brand;
            document.querySelector('select[name="material"]').value = spool.material;
            document.querySelector('input[name="colorName"]').value = spool.color;
            document.getElementById('colorPicker').value = spool.colorCode || '#3b82f6';
            document.getElementById('colorHex').textContent = spool.colorCode || '#3b82f6';
            document.querySelector('select[name="supplierId"]').value = spool.supplierId || '';
            document.querySelector('select[name="diameter"]').value = spool.diameter;
            document.querySelector('input[name="initialWeight"]').value = spool.initialWeight;
            document.querySelector('input[name="spoolWeight"]').value = spool.spoolWeight || 140;
            document.querySelector('input[name="remainingWeight"]').value = spool.initialWeight;
            document.querySelector('input[name="price"]').value = spool.price || '';
            
            document.getElementById('addFilamentModal').classList.remove('hidden');
            document.getElementById('addFilamentModal').classList.add('flex');
        }
        
        function editFilament(id) {
            const spool = spools.find(s => s._id === id);
            if (!spool) return;
            
            document.getElementById('modalTitle').textContent = '编辑耗材';
            document.getElementById('filamentId').value = id;
            document.querySelector('select[name="brand"]').value = spool.brand;
            document.querySelector('select[name="material"]').value = spool.material;
            document.querySelector('input[name="colorName"]').value = spool.color;
            document.getElementById('colorPicker').value = spool.colorCode || '#3b82f6';
            document.getElementById('colorHex').textContent = spool.colorCode || '#3b82f6';
            document.querySelector('select[name="supplierId"]').value = spool.supplierId || '';
            document.querySelector('select[name="diameter"]').value = spool.diameter;
            document.querySelector('input[name="initialWeight"]').value = spool.initialWeight;
            document.querySelector('input[name="spoolWeight"]').value = spool.spoolWeight || 140;
            document.querySelector('input[name="remainingWeight"]').value = spool.remainingWeight;
            document.querySelector('input[name="price"]').value = spool.price || '';
            
            document.getElementById('addFilamentModal').classList.remove('hidden');
            document.getElementById('addFilamentModal').classList.add('flex');
        }
        
        async function deleteFilament(id) {
            if (!confirm('确定要删除这个耗材吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/spools/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('删除成功！');
                    loadData();
                }
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败：网络错误');
            }
        }
        
        function updateSiteName() {
            const siteTitle = document.getElementById('siteTitle');
            const savedName = localStorage.getItem('siteName') || 'Leo的百宝箱';
            siteTitle.textContent = savedName;
        }
        
        const defaultMaterials = ['PLA', 'PETG', 'ABS', 'TPU', 'ASA'];
        const defaultBrands = ['Matte', 'Basic', 'Silk', 'Pro', 'Plus'];
        
        function initSettings() {
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeModal = document.getElementById('closeModal');
            
            const addMaterialBtn = document.getElementById('addMaterialType');
            const newMaterialInput = document.getElementById('newMaterialType');
            const materialTypesList = document.getElementById('materialTypesList');
            
            const addBrandBtn = document.getElementById('addBrandType');
            const newBrandInput = document.getElementById('newBrandType');
            const brandTypesList = document.getElementById('brandTypesList');
            
            let materials = JSON.parse(localStorage.getItem('materials')) || defaultMaterials;
            let brands = JSON.parse(localStorage.getItem('brands')) || defaultBrands;
            
            function renderMaterials() {
                if (!materialTypesList) return;
                materialTypesList.innerHTML = materials.map((mat, index) => `
                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">
                        ${mat}
                        <button onclick="removeMaterial(${index})" class="hover:text-red-500">
                            <i class="fa fa-times"></i>
                        </button>
                    </span>
                `).join('');
            }
            
            function renderBrands() {
                if (!brandTypesList) return;
                brandTypesList.innerHTML = brands.map((brand, index) => `
                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm">
                        ${brand}
                        <button onclick="removeBrand(${index})" class="hover:text-red-500">
                            <i class="fa fa-times"></i>
                        </button>
                    </span>
                `).join('');
            }
            
            window.removeMaterial = function(index) {
                materials.splice(index, 1);
                localStorage.setItem('materials', JSON.stringify(materials));
                renderMaterials();
            };
            
            window.removeBrand = function(index) {
                brands.splice(index, 1);
                localStorage.setItem('brands', JSON.stringify(brands));
                renderBrands();
            };
            
            if (addMaterialBtn) {
                addMaterialBtn.addEventListener('click', () => {
                    const newMaterial = newMaterialInput.value.trim().toUpperCase();
                    if (newMaterial && !materials.includes(newMaterial)) {
                        materials.push(newMaterial);
                        localStorage.setItem('materials', JSON.stringify(materials));
                        newMaterialInput.value = '';
                        renderMaterials();
                    }
                });
            }
            
            if (newMaterialInput) {
                newMaterialInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && addMaterialBtn) {
                        addMaterialBtn.click();
                    }
                });
            }
            
            if (addBrandBtn) {
                addBrandBtn.addEventListener('click', () => {
                    const newBrand = newBrandInput.value.trim();
                    if (newBrand && !brands.includes(newBrand)) {
                        brands.push(newBrand);
                        localStorage.setItem('brands', JSON.stringify(brands));
                        newBrandInput.value = '';
                        renderBrands();
                    }
                });
            }
            
            if (newBrandInput) {
                newBrandInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && addBrandBtn) {
                        addBrandBtn.click();
                    }
                });
            }
            
            renderMaterials();
            renderBrands();
            
            if (settingsBtn) {
                settingsBtn.addEventListener('click', () => {
                    settingsModal.classList.remove('hidden');
                });
            }
            
            if (closeModal) {
                closeModal.addEventListener('click', () => {
                    settingsModal.classList.add('hidden');
                });
            }
            
            if (settingsModal) {
                settingsModal.addEventListener('click', (e) => {
                    if (e.target === settingsModal) {
                        settingsModal.classList.add('hidden');
                    }
                });
            }
        }
        
        function loadSettings() {
            const materials = JSON.parse(localStorage.getItem('materials')) || defaultMaterials;
            const brands = JSON.parse(localStorage.getItem('brands')) || defaultBrands;
            
            const materialSelect = document.getElementById('materialSelect');
            const filterMaterial = document.getElementById('filterMaterial');
            const brandSelect = document.getElementById('brandSelect');
            
            const materialOptions = materials.map(mat => `<option value="${mat}">${mat}</option>`).join('');
            const brandOptions = brands.map(brand => `<option value="${brand}">${brand}</option>`).join('');
            
            if (materialSelect) {
                materialSelect.innerHTML = materialOptions;
            }
            if (filterMaterial) {
                filterMaterial.innerHTML = '<option value="">全部材料</option>' + materialOptions;
            }
            if (brandSelect) {
                brandSelect.innerHTML = brandOptions;
            }
        }
        
        function initSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarItems = document.querySelectorAll('.sidebar-item span');
            const siteTitle = document.getElementById('siteTitle');
            
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('w-16');
                sidebar.classList.remove('w-64');
                sidebarItems.forEach(item => item.classList.add('hidden'));
                if (siteTitle) siteTitle.classList.add('hidden');
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-angle-left');
                    icon.classList.add('fa-angle-right');
                }
            }
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-16');
                
                sidebarItems.forEach(item => {
                    item.classList.toggle('hidden');
                });
                
                if (siteTitle) {
                    siteTitle.classList.toggle('hidden');
                }
                
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-angle-left');
                    icon.classList.toggle('fa-angle-right');
                }
                
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('w-16'));
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            updateSiteName();
            initSettings();
            loadSettings();
            loadData();
            initSidebarToggle();
            
            document.getElementById('colorPicker').addEventListener('input', function(e) {
                document.getElementById('colorHex').textContent = e.target.value;
            });
            
            document.getElementById('addFilamentForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const form = this;
                const id = document.getElementById('filamentId').value;
                const initialWeightVal = parseFloat(form.initialWeight.value);
                const spoolData = {
                    brand: form.brand.value,
                    material: form.material.value,
                    color: form.colorName.value,
                    colorCode: document.getElementById('colorPicker').value,
                    supplierId: form.supplierId.value || null,
                    diameter: form.diameter.value,
                    initialWeight: initialWeightVal,
                    remainingWeight: parseFloat(form.remainingWeight.value) || initialWeightVal,
                    spoolWeight: parseFloat(form.spoolWeight.value) || 140,
                    price: parseFloat(form.price.value) || 0
                };
                
                try {
                    const url = id ? `${API_BASE_URL}/spools/${id}` : `${API_BASE_URL}/spools`;
                    const method = id ? 'PUT' : 'POST';
                    
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(spoolData)
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        showMessage(id ? '更新成功！' : '添加成功！');
                        closeAddFilamentModal();
                        loadData();
                    } else {
                        showMessage('保存失败：' + data.message);
                    }
                } catch (error) {
                    console.error('保存失败:', error);
                    showMessage('保存失败：网络错误');
                }
            });
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('add') === 'true') {
                openAddFilamentModal();
            }
        });
    </script>
</body>
</html>
