    <script>
        (function() {
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                document.write('<style id="sidebar-init-style">body { visibility: hidden; }</style>');
                document.addEventListener('DOMContentLoaded', function() {
                    const sidebar = document.getElementById('sidebar');
                    const sidebarItems = document.querySelectorAll('.sidebar-item span');
                    const siteTitle = document.getElementById('siteTitle');
                    const sidebarToggle = document.getElementById('sidebarToggle');
                    
                    sidebar.classList.remove('w-64');
                    sidebar.classList.add('w-16');
                    sidebarItems.forEach(item => item.classList.add('hidden'));
                    if (siteTitle) siteTitle.classList.add('hidden');
                    const icon = sidebarToggle.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-angle-left');
                        icon.classList.add('fa-angle-right');
                    }
                    
                    document.getElementById('sidebar-init-style').remove();
                    document.body.style.visibility = 'visible';
                });
            }
        })();
    </script>

    <script src="js/utils.js"></script>
    <script>
        const platformMap = { 'taobao': '淘宝', 'jd': '京东', 'pinduoduo': '拼多多', 'douyin': '抖店' };
        let salesRecords = [];
        let dbPlatformColors = {};

        function openAddSalesModal() {
            document.getElementById('addSalesModal').classList.remove('hidden');
            document.querySelector('#addSalesForm input[name="date"]').value = new Date().toISOString().split('T')[0];
            document.querySelector('#addSalesForm input[name="shippingCost"]').value = '3.5';
            document.getElementById('profitPreview').textContent = '¥0.00';
        }

        function closeAddSalesModal() {
            document.getElementById('addSalesModal').classList.add('hidden');
            document.getElementById('addSalesForm').reset();
            document.getElementById('profitPreview').textContent = '¥0.00';
            document.getElementById('salesModalTitle').textContent = '添加销售记录';
            document.getElementById('salesModalSaveBtn').textContent = '保存';
            document.getElementById('editRecordId').value = '';
        }

        function updatePlatformSelect() {
            const select = document.getElementById('platformSelect');
            const filterSelect = document.getElementById('salesFilterPlatform');
            
            if (!select) return;
            
            while (select.options.length > 0) select.remove(0);
            
            const savedPlatforms = JSON.parse(localStorage.getItem('platforms')) || ['taobao', 'douyin', 'pinduoduo', 'jd'];
            
            savedPlatforms.forEach(platform => {
                const displayName = platformMap[platform] || platform;
                const option = document.createElement('option');
                option.value = platform;
                option.textContent = displayName;
                select.appendChild(option);
            });
            
            if (filterSelect) {
                while (filterSelect.options.length > 1) filterSelect.remove(1);
                
                savedPlatforms.forEach(platform => {
                    const displayName = platformMap[platform] || platform;
                    const option = document.createElement('option');
                    option.value = platform;
                    option.textContent = displayName;
                    filterSelect.appendChild(option);
                });
            }
        }

        async function loadSalesRecords() {
            const savedRecords = localStorage.getItem('salesRecords');

            try {
                const response = await fetch(`${API_BASE_URL}/sales-records`);
                const data = await response.json();

                if (data.success && data.data && data.data.length > 0) {
                    salesRecords = data.data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    localStorage.setItem('salesRecords', JSON.stringify(salesRecords));
                } else if (savedRecords) {
                    salesRecords = JSON.parse(savedRecords).sort((a, b) => new Date(b.date) - new Date(a.date));
                } else {
                    salesRecords = [];
                }
            } catch (error) {
                console.error('加载销售记录失败:', error);
                salesRecords = savedRecords ? JSON.parse(savedRecords).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];
            }

            try {
                const settingsRes = await fetch(`${API_BASE_URL}/expense-settings`);
                const settingsData = await settingsRes.json();
                if (settingsData.success && settingsData.data && settingsData.data.platformColors !== undefined) {
                    dbPlatformColors = settingsData.data.platformColors;
                }
            } catch (error) {
                console.error('加载平台颜色失败:', error);
            }

            if (salesRecords.length === 0) {
                salesRecords = [
                    { "_id": "demo1", "platform": "taobao", "amount": 111, "productName": "洞洞板挂钩", "materialCost": 27.33, "shippingCost": 3.5, "profit": 80.17, "date": "2026-05-09T00:00:00.000Z", "materialType": "PLA" },
                    { "_id": "demo2", "platform": "taobao", "amount": 323, "productName": "充电底座", "materialCost": 270.69, "shippingCost": 3.5, "profit": 48.81, "date": "2026-05-09T00:00:00.000Z", "materialType": "PLA" },
                    { "_id": "demo3", "platform": "douyin", "amount": 211, "productName": "收纳盒", "materialCost": 33.66, "shippingCost": 3.5, "profit": 173.84, "date": "2026-05-08T00:00:00.000Z", "materialType": "PETG" }
                ];
                localStorage.setItem('salesRecords', JSON.stringify(salesRecords));

                salesRecords.forEach(record => {
                    fetch(`${API_BASE_URL}/sales-records`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(record)
                    }).catch(() => {});
                });
            }

            updateStatistics();
            renderSalesTable();
            renderPlatformDistribution();
            renderSalesMonthlyChart();
        }

        function getFilteredSales() {
            const range = document.getElementById('salesRangeSelect').value;
            const now = new Date();
            if (range === 'month') {
                const currentMonth = now.toISOString().substring(0, 7);
                return salesRecords.filter(s => s.date.startsWith(currentMonth));
            } else if (range === 'quarter') {
                const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 2, 1);
                return salesRecords.filter(s => new Date(s.date) >= threeMonthsAgo);
            } else if (range === 'year') {
                const oneYearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
                return salesRecords.filter(s => new Date(s.date) >= oneYearAgo);
            }
            return salesRecords;
        }

        function updateStatistics() {
            const filtered = getFilteredSales();
            const totalSales = filtered.reduce((sum, s) => sum + s.amount, 0);
            const totalProfit = filtered.reduce((sum, s) => sum + s.profit, 0);
            const profitRate = totalSales > 0 ? (totalProfit / totalSales * 100) : 0;

            document.getElementById('totalSales').textContent = `¥${totalSales.toFixed(2)}`;
            document.getElementById('totalProfit').textContent = `¥${totalProfit.toFixed(2)}`;
            document.getElementById('profitRate').textContent = `${profitRate.toFixed(2)}%`;

            const labelMap = { all: '总销售额', month: '本月销售', quarter: '近三月销售', year: '近一年销售' };
            const range = document.getElementById('salesRangeSelect').value;
            document.getElementById('salesLabel').textContent = labelMap[range];
        }

        function renderPlatformDistribution() {
            const defaultColors = ['#f57c00', '#3b82f6', '#22c55e', '#a855f7', '#ef4444', '#eab308'];

            const filtered = getFilteredSales();
            const platformTotals = {};
            filtered.forEach(s => {
                platformTotals[s.platform] = (platformTotals[s.platform] || 0) + s.amount;
            });

            const total = Object.values(platformTotals).reduce((sum, v) => sum + v, 0);
            const container = document.getElementById('platformDistribution');
            const pieChart = document.getElementById('platformPieChart');
            const pieCenterText = document.getElementById('pieCenterText');

            if (total === 0) {
                pieChart.style.background = '#e5e7eb';
                pieChart.style.borderRadius = '50%';
                pieCenterText.textContent = '暂无数据';
                container.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">暂无数据</div>';
                return;
            }

            const entries = Object.entries(platformTotals).sort((a, b) => b[1] - a[1]);
            let currentAngle = 0;
            const gradientParts = [];

            entries.forEach(([platform, amount]) => {
                const percentage = amount / total * 100;
                const color = dbPlatformColors[platform] || defaultColors[entries.indexOf(entries.find(e => e[0] === platform)) % defaultColors.length];
                gradientParts.push(`${color} ${currentAngle}% ${currentAngle + percentage}%`);
                currentAngle += percentage;
            });

            pieChart.style.background = `conic-gradient(${gradientParts.join(', ')})`;
            pieChart.style.borderRadius = '50%';
            pieCenterText.textContent = `¥${total.toFixed(0)}`;

            container.innerHTML = entries.map(([platform, amount], index) => {
                const displayName = platformMap[platform] || platform;
                const color = dbPlatformColors[platform] || defaultColors[index % defaultColors.length];
                const percentage = (amount / total * 100).toFixed(1);
                return `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-2.5 h-2.5 rounded-full mr-2 flex-shrink-0" style="background: ${color}"></div>
                            <span class="text-sm text-gray-600">${displayName}</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-sm font-medium text-dark">¥${amount.toFixed(0)}</span>
                            <span class="text-xs text-gray-400 w-12 text-right">${percentage}%</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSalesMonthlyChart() {
            const yearSelect = document.getElementById('salesYearSelect');
            const currentYear = new Date().getFullYear();
            const years = [...new Set(salesRecords.map(s => new Date(s.date).getFullYear()))];
            if (years.length === 0) years.push(currentYear);
            years.sort((a, b) => b - a);

            yearSelect.innerHTML = years.map(y =>
                `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}年</option>`
            ).join('');

            const selectedYear = parseInt(yearSelect.value);
            const monthlySales = Array(12).fill(0);
            const monthlyProfit = Array(12).fill(0);

            salesRecords.forEach(s => {
                const date = new Date(s.date);
                if (date.getFullYear() === selectedYear) {
                    monthlySales[date.getMonth()] += s.amount;
                    monthlyProfit[date.getMonth()] += s.profit;
                }
            });

            const maxValue = Math.max(...monthlySales, ...monthlyProfit, 1);
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const chartHeight = 220;
            const barMaxHeight = chartHeight - 24;

            const container = document.getElementById('salesMonthlyChart');
            container.innerHTML = `
                <div class="absolute bottom-6 left-0 right-0 flex items-end justify-around" style="height: ${barMaxHeight}px;">
                    ${monthlySales.map((salesVal, index) => {
                        const salesHeight = Math.max((salesVal / maxValue) * barMaxHeight, 0);
                        const profitHeight = Math.max((monthlyProfit[index] / maxValue) * barMaxHeight, 0);
                        return `
                            <div class="flex-1 flex items-end justify-center h-full px-1 gap-0.5 relative group">
                                <div class="absolute bottom-full mb-2 px-2 py-1 bg-dark text-white text-xs rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10">${months[index]}<br>销售额: ¥${salesVal.toFixed(2)}<br>利润: ¥${monthlyProfit[index].toFixed(2)}</div>
                                <div class="w-2/5 bg-green-500 rounded-t cursor-pointer hover:opacity-80 transition-opacity" style="height: ${salesHeight}px;"></div>
                                <div class="w-2/5 bg-blue-500 rounded-t cursor-pointer hover:opacity-80 transition-opacity" style="height: ${profitHeight}px;"></div>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="absolute bottom-0 left-0 right-0 flex justify-around" style="height: 24px;">
                    ${months.map(m => `<div class="flex-1 text-center text-xs text-gray-500 leading-6">${m}</div>`).join('')}
                </div>
            `;
        }

        function renderSalesTable() {
            const filterPlatform = document.getElementById('salesFilterPlatform').value;
            const startDate = document.getElementById('salesFilterStartDate').value;
            const endDate = document.getElementById('salesFilterEndDate').value;
            
            let filtered = salesRecords;
            if (filterPlatform) filtered = filtered.filter(s => s.platform === filterPlatform);
            if (startDate) filtered = filtered.filter(s => s.date >= startDate);
            if (endDate) filtered = filtered.filter(s => s.date <= endDate);
            
            const tbody = document.getElementById('salesTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-500">暂无销售记录</td></tr>';
            } else {
                tbody.innerHTML = filtered.map(record => {
                    const profitColor = record.profit >= 0 ? 'text-green-600' : 'text-red-600';
                    return `<tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm">${new Date(record.date).toLocaleDateString('zh-CN')}</td>
                        <td class="px-4 py-3 text-sm">${platformMap[record.platform] || record.platform}</td>
                        <td class="px-4 py-3 text-sm">${record.productName}</td>
                        <td class="px-4 py-3 text-sm text-right font-medium text-green-500">¥${record.amount.toFixed(2)}</td>
                        <td class="px-4 py-3 text-sm text-right text-gray-600">¥${record.materialCost.toFixed(2)}</td>
                        <td class="px-4 py-3 text-sm text-right text-gray-600">¥${record.shippingCost.toFixed(2)}</td>
                        <td class="px-4 py-3 text-sm text-right font-medium ${profitColor}">¥${record.profit.toFixed(2)}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="editSalesRecord('${record._id}')" class="text-blue-500 hover:text-blue-700 mr-2"><i class="fa fa-pencil"></i></button>
                            <button onclick="deleteSalesRecord('${record._id}')" class="text-red-500 hover:text-red-700"><i class="fa fa-trash"></i></button>
                        </td>
                    </tr>`;
                }).join('');
            }
        }

        async function editSalesRecord(id) {
            const record = salesRecords.find(r => r._id === id);
            if (!record) return;
            
            document.getElementById('salesModalTitle').textContent = '编辑销售记录';
            document.getElementById('salesModalSaveBtn').textContent = '更新';
            document.getElementById('editRecordId').value = id;
            
            document.getElementById('platformSelect').value = record.platform;
            document.querySelector('#addSalesForm input[name="productName"]').value = record.productName;
            document.querySelector('#addSalesForm input[name="amount"]').value = record.amount;
            document.querySelector('#addSalesForm select[name="materialType"]').value = record.materialType || 'PLA';
            document.querySelector('#addSalesForm input[name="materialWeight"]').value = record.materialWeight || '';
            document.querySelector('#addSalesForm input[name="printTime"]').value = record.printTime || '';
            document.querySelector('#addSalesForm input[name="shippingCost"]').value = record.shippingCost;
            document.querySelector('#addSalesForm input[name="date"]').value = record.date.split('T')[0];
            document.querySelector('#addSalesForm input[name="materialCost"]').value = record.materialCost;
            
            const profit = record.amount - record.materialCost - record.shippingCost;
            const profitColor = profit >= 0 ? 'text-green-600' : 'text-red-600';
            document.getElementById('profitPreview').textContent = `¥${profit.toFixed(2)}`;
            document.getElementById('profitPreview').className = `text-lg font-bold ${profitColor}`;
            
            document.getElementById('addSalesModal').classList.remove('hidden');
        }

        async function deleteSalesRecord(id) {
            if (!confirm('确定要删除这条销售记录吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/sales-records/${id}`, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.success) {
                    salesRecords = salesRecords.filter(r => r._id !== id);
                    localStorage.setItem('salesRecords', JSON.stringify(salesRecords));
                    updateStatistics();
                    renderSalesTable();
                    renderPlatformDistribution();
                    renderSalesMonthlyChart();
                    showMessage('删除成功！');
                } else {
                    showMessage('删除失败：' + (data.message || '未知错误'));
                }
            } catch (error) {
                console.error('删除销售记录失败:', error);
                showMessage('删除失败：网络错误');
            }
        }

        function clearSalesFilters() {
            document.getElementById('salesFilterPlatform').value = '';
            document.getElementById('salesFilterStartDate').value = '';
            document.getElementById('salesFilterEndDate').value = '';
            renderSalesTable();
        }

        function initSettings() {
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeModal = document.getElementById('closeModal');
            const saveSettings = document.getElementById('saveSettings');
            const addPlatformBtn = document.getElementById('addPlatformType');
            const newPlatformInput = document.getElementById('newPlatformType');
            const platformTypesList = document.getElementById('platformTypesList');
            const platformColorSelect = document.getElementById('platformColorSelect');
            const platformColorPicker = document.getElementById('platformColorPicker');
            const savePlatformColorBtn = document.getElementById('savePlatformColor');
            const platformColorList = document.getElementById('platformColorList');

            let platforms = JSON.parse(localStorage.getItem('platforms')) || ['taobao', 'douyin', 'pinduoduo', 'jd'];

            function renderPlatforms() {
                if (!platformTypesList) return;
                platformTypesList.innerHTML = platforms.map((platform, index) => {
                    const displayName = platformMap[platform] || platform;
                    const color = dbPlatformColors[platform] || '#8b5cf6';
                    return `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm text-white" style="background-color: ${color}">
                        ${displayName}
                        <button onclick="removePlatform(${index})" class="hover:opacity-70"><i class="fa fa-times"></i></button>
                    </span>`;
                }).join('');
            }

            function updatePlatformColorSelect() {
                if (!platformColorSelect) return;
                platformColorSelect.innerHTML = '<option value="">选择平台</option>' +
                    platforms.map(p => {
                        const displayName = platformMap[p] || p;
                        return `<option value="${p}">${displayName}</option>`;
                    }).join('');
            }

            window.removePlatform = function(index) {
                platforms.splice(index, 1);
                localStorage.setItem('platforms', JSON.stringify(platforms));
                renderPlatforms();
                updatePlatformSelect();
                updatePlatformColorSelect();
            };

            if (addPlatformBtn && newPlatformInput) {
                addPlatformBtn.addEventListener('click', () => {
                    const newPlatform = newPlatformInput.value.trim();
                    if (newPlatform && !platforms.includes(newPlatform)) {
                        platforms.push(newPlatform);
                        localStorage.setItem('platforms', JSON.stringify(platforms));
                        newPlatformInput.value = '';
                        renderPlatforms();
                        updatePlatformSelect();
                        updatePlatformColorSelect();
                    }
                });

                newPlatformInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addPlatformBtn.click();
                });
            }

            if (platformColorSelect && platformColorPicker && savePlatformColorBtn) {
                platformColorSelect.addEventListener('change', () => {
                    const platform = platformColorSelect.value;
                    if (platform && dbPlatformColors[platform]) {
                        platformColorPicker.value = dbPlatformColors[platform];
                    } else {
                        platformColorPicker.value = '#f57c00';
                    }
                });

                savePlatformColorBtn.addEventListener('click', async () => {
                    const platform = platformColorSelect.value;
                    const color = platformColorPicker.value;
                    console.log('保存颜色按钮被点击');
                    console.log('选择的平台:', platform);
                    console.log('选择的颜色:', color);
                    if (!platform) {
                        alert('请先选择一个平台');
                        return;
                    }
                    dbPlatformColors[platform] = color;
                    console.log('准备发送的 dbPlatformColors:', dbPlatformColors);
                    try {
                        console.log('发送请求到:', `${API_BASE_URL}/expense-settings`);
                        const response = await fetch(`${API_BASE_URL}/expense-settings`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ platformColors: dbPlatformColors })
                        });
                        console.log('收到响应:', response.status);
                        const data = await response.json();
                        console.log('响应数据:', data);
                        renderPlatforms();
                        renderPlatformDistribution();
                        alert('颜色已保存！');
                    } catch (error) {
                        console.error('保存颜色失败:', error);
                        alert('保存失败: ' + error.message);
                    }
                });
            }

            renderPlatforms();
            updatePlatformColorSelect();

            if (settingsBtn && settingsModal) {
                settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
            }

            if (closeModal && settingsModal) {
                closeModal.addEventListener('click', () => settingsModal.classList.add('hidden'));
            }

            if (settingsModal) {
                settingsModal.addEventListener('click', (e) => {
                    if (e.target === settingsModal) settingsModal.classList.add('hidden');
                });
            }

            if (saveSettings && settingsModal) {
                saveSettings.addEventListener('click', () => {
                    alert('设置已保存！');
                    settingsModal.classList.add('hidden');
                });
            }
        }
        
        function initSidebarToggle() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarItems = document.querySelectorAll('.sidebar-item span');
            const siteTitle = document.getElementById('siteTitle');
            
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('w-16');
                sidebar.classList.remove('w-64');
                sidebarItems.forEach(item => item.classList.add('hidden'));
                if (siteTitle) siteTitle.classList.add('hidden');
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-angle-left');
                    icon.classList.add('fa-angle-right');
                }
            }
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-16');
                
                sidebarItems.forEach(item => {
                    item.classList.toggle('hidden');
                });
                
                if (siteTitle) {
                    siteTitle.classList.toggle('hidden');
                }
                
                const icon = sidebarToggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-angle-left');
                    icon.classList.toggle('fa-angle-right');
                }
                
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('w-16'));
            });
        }

        document.addEventListener('DOMContentLoaded', async function() {
            updatePlatformSelect();
            await loadSalesRecords();
            initSettings();
            initSidebarToggle();
            
            document.getElementById('addSalesForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                
                const record = {
                    platform: formData.get('platform'),
                    amount: parseFloat(formData.get('amount')),
                    productName: formData.get('productName'),
                    materialCost: parseFloat(formData.get('materialCost')) || 0,
                    shippingCost: parseFloat(formData.get('shippingCost')) || 0,
                    profit: parseFloat(formData.get('amount')) - (parseFloat(formData.get('materialCost')) || 0) - (parseFloat(formData.get('shippingCost')) || 0),
                    date: new Date(formData.get('date')).toISOString(),
                    materialType: formData.get('materialType')
                };
                
                const editId = document.getElementById('editRecordId').value;
                
                try {
                    if (editId) {
                        const response = await fetch(`${API_BASE_URL}/sales-records/${editId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(record)
                        });
                        const data = await response.json();
                        if (data.success) {
                            const index = salesRecords.findIndex(r => r._id === editId);
                            if (index !== -1) salesRecords[index] = { ...salesRecords[index], ...record };
                        }
                    } else {
                        const response = await fetch(`${API_BASE_URL}/sales-records`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(record)
                        });
                        const data = await response.json();
                        record._id = data.success && data.data ? data.data._id : Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
                        record.createdAt = new Date().toISOString();
                        salesRecords.unshift(record);
                    }
                } catch (error) {
                    console.error('保存销售记录失败:', error);
                    if (!editId) {
                        record._id = Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
                        record.createdAt = new Date().toISOString();
                        salesRecords.unshift(record);
                    }
                }
                
                localStorage.setItem('salesRecords', JSON.stringify(salesRecords));
                updateStatistics();
                renderSalesTable();
                renderPlatformDistribution();
                renderSalesMonthlyChart();
                showMessage(editId ? '更新成功！' : '添加成功！');
                closeAddSalesModal();
            });
            
            document.getElementById('salesRangeSelect').addEventListener('change', function() {
                updateStatistics();
                renderPlatformDistribution();
            });
            document.getElementById('salesYearSelect').addEventListener('change', renderSalesMonthlyChart);

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('add') === 'true') {
                openAddSalesModal();
            }
        });
    </script>
</body>
</html>
